services:
  postgres:
    image: postgres:16-alpine
    container_name: infopath-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: infopath_banking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d infopath_banking"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
